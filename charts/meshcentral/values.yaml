image:
  registry: ghcr.io/flamingo-stack/meshcentral
  repository: meshcentral
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

# -- Sensitive credentials (stored in Secret)
credentials:
  meshUser: ""
  meshPass: ""
  meshConfigKey: ""

# -- Non-sensitive environment variables (stored in ConfigMap)
env:
  MESH_PROTOCOL: "ws"
  MESH_NGINX_HOST: "localhost"
  MESH_EXTERNAL_PORT: "4430"
  MESH_DEVICE_GROUP: "OpenFrame"
  MESH_NGINX_NAT_HOST: ""
  OPENFRAME_MODE: "true"
  OPENFRAME_GATEWAY_URL: ""

# -- MeshCentral config.json contents
# Ref: https://github.com/Ylianst/MeshCentral/blob/master/meshcentral-config-schema.json
config:
  settings:
    plugins:
      enabled: true
      list:
        - openframe
    mongodb: ""  # Set via --set or values override
    dbExpire:
      events: 157680000
    certUrl: []
    port: 4430
    aliasPort: 443
    alias: []
    agentAliasUrl: ""
    agentAliasDns: []
    tlsOffload: true
    redirPort: 0
    AgentPong: 300
    SelfUpdate: false
    AllowFraming: true
    AllowLoginToken: true
    WebRTC: false
    IgnoreAgentHashCheck: true
    production: false
    meshAgentBinaries:
      darwin-x64:
        compile: true
        force: true
      darwin-arm64:
        compile: true
        force: true
  domains:
    "":
      title: MeshCentral
      title2: MeshCentral
      minify: true
      NewAccounts: false
      localSessionRecording: true
      allowedOrigin: true
    openframe_public:
      share: /opt/mesh/public

service:
  type: ClusterIP
  port: 443

securityContext:
  runAsUser: 0

startupProbe:
  httpGet:
    path: /health.ashx
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 30

livenessProbe:
  httpGet:
    path: /health.ashx
    port: http
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health.ashx
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "300m"
