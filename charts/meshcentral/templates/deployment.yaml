apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  {{- with .Values.deploymentAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}

  strategy:
    type: Recreate

  selector:
    matchLabels:
      {{- include "meshcentral.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        checksum/env: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "meshcentral.selectorLabels" . | nindent 8 }}

    spec:
      securityContext:
        fsGroup: 1000

      initContainers:
        - name: wait-mongodb
          image: "{{ .Values.initImage.registry }}/{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          # MC_MONGO_URI is assembled by the kubelet via $(VAR) substitution against
          # envFrom-sourced parts (see pkg/kubelet/kubelet_pods.go makeEnvironmentVariables:
          # envFrom is processed first, then env[]). bash only sees a fully-resolved URI,
          # so values containing $ or other shell metachars are safe.
          command: ["timeout", "300", "sh", "-c", "until timeout 10 mongosh \"$MC_MONGO_URI\" --quiet --eval 'rs.status()' >/dev/null 2>&1; do sleep 5; done"]
          envFrom:
            - secretRef:
                name: {{ .Values.mongodb.existingSecret | default (printf "%s-mongodb-creds" .Chart.Name) }}
            - configMapRef:
                name: {{ .Values.mongodb.existingConfigMap | default (printf "%s-mongodb-config" .Chart.Name) }}
          env:
            - name: MC_MONGO_URI
              value: "mongodb://$(MC_MONGO_USER):$(MC_MONGO_PASSWORD)@$(MC_MONGO_HOSTS)/$(MC_MONGO_DATABASE)?replicaSet=$(MC_MONGO_REPLICA_SET)&authSource=$(MC_MONGO_AUTH_SOURCE)$(MC_MONGO_URI_OPTIONS)"

        - name: meshcentral-init
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              : "${MESH_DIR:?}" "${MESH_TEMP_DIR:?}" "${MESH_INSTALL_DIR:?}" "${MESH_CONFIG_KEY:?}"
              DATA="${MESH_DIR}/meshcentral-data"; CFG=/tmp/config/config.json

              # pluginHandler.js hardcodes {datapath}/plugins; symlink from read-only image layer.
              mkdir -p "${DATA}/plugins" && ln -sfn "${MESH_TEMP_DIR}/plugins/openframe" "${DATA}/plugins/openframe"

              # --launch 1 bypasses parent/child auto-restart so sync errors surface; </dev/zero
              # keeps stdin open (mainStart exits on stdin 'end' at meshcentral.js:4545 in k8s).
              # ${MC_MONGO_*} placeholders in config.json are substituted in-process by both
              # meshcentral.js getConfig() and plugins/migrate.js loadConfig().
              timeout "${SYNC_TIMEOUT:-600}" node "${MESH_INSTALL_DIR}/meshcentral/meshcentral.js" --launch 1 --datapath "${DATA}" --configfile "${CFG}" --configkey "${MESH_CONFIG_KEY}" --syncconfigfiles </dev/zero
              timeout "${MIGRATE_TIMEOUT:-300}" node "${MESH_TEMP_DIR}/plugins/openframe/migrate.js" --datapath "${DATA}" --configfile "${CFG}"
          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-default
            - secretRef:
                name: {{ .Values.mongodb.existingSecret | default (printf "%s-mongodb-creds" .Chart.Name) }}
            - configMapRef:
                name: {{ .Values.mongodb.existingConfigMap | default (printf "%s-mongodb-config" .Chart.Name) }}
          env:
            - name: MESH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshUserKey }}
            - name: MESH_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshPassKey }}
            - name: MESH_CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshConfigKeyKey }}
          volumeMounts:
            - name: data
              mountPath: /opt/mesh
            - name: config
              mountPath: /tmp/config
              readOnly: true

      containers:
        - name: meshcentral
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node"]
          args:
            - "/opt/meshcentral/meshcentral/meshcentral.js"
            - "--datapath"
            - "/opt/mesh/meshcentral-data"
            - "--configfile"
            - "/tmp/config/config.json"
            - "--configkey"
            - "$(MESH_CONFIG_KEY)"
          ports:
            - containerPort: {{ .Values.config.settings.port | default 4430 }}
              name: http

          envFrom:
            - configMapRef:
                name: {{ .Chart.Name }}-default
            - secretRef:
                name: {{ .Values.mongodb.existingSecret | default (printf "%s-mongodb-creds" .Chart.Name) }}
            - configMapRef:
                name: {{ .Values.mongodb.existingConfigMap | default (printf "%s-mongodb-config" .Chart.Name) }}
          env:
            - name: MESH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshUserKey }}
            - name: MESH_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshPassKey }}
            - name: MESH_CONFIG_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | default (printf "%s-credentials" .Chart.Name) }}
                  key: {{ .Values.credentials.meshConfigKeyKey }}

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          startupProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: 5
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /health.ashx
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}

          volumeMounts:
            - name: data
              mountPath: /opt/mesh
            - name: config
              mountPath: /tmp/config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: {{ .Chart.Name }}-config
        - name: data
          emptyDir: {}
