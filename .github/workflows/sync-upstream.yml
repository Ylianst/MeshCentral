name: Sync from upstream MeshCentral

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BRANCH: sync/upstream-master
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync
        run: |
          if [ "$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --state open --json number --jq 'length')" -gt 0 ]; then
            echo "::notice::open sync PR exists for $BRANCH — skipping"
            exit 0
          fi

          git config user.name  "flamingo-sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"
          git remote add upstream https://github.com/Ylianst/MeshCentral.git
          git fetch upstream master

          if git merge-base --is-ancestor upstream/master origin/master; then
            echo "::notice::master already contains upstream/master"
            exit 0
          fi

          git checkout -B "$BRANCH" origin/master
          if ! git merge --no-ff --no-edit upstream/master; then
            echo "::notice::merge has conflicts — skipping, will retry next run"
            exit 0
          fi
          git push -f origin "$BRANCH"

          gh pr create --repo "$GITHUB_REPOSITORY" --base master --head "$BRANCH" \
            --title "Sync from Fork" \
            --body "Automatic weekly sync from \`Ylianst/MeshCentral@master\`."
