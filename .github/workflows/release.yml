name: MeshCentral Release

# =============================================================================
# WORKFLOW CONFIGURATION
# =============================================================================

permissions:
  contents: write
  packages: write
  actions: write
  pull-requests: write
  attestations: write
  id-token: write

on:
  push:
    branches: [master]
    paths:
      - 'docker/**'
      - 'charts/**'
      - 'package.json'
      - 'translate/**'
      - '.github/**'
      - '*.js'
      - 'views/**'
      - 'public/**'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.1.57)"
        required: true
        type: string

env:
  REGISTRY: "ghcr.io"
  ORGANISATION: ${{ github.repository_owner }}
  REPOSITORY: ${{ github.event.repository.name }}
  IMAGE_NAME: meshcentral


# =============================================================================
# JOBS
# =============================================================================

jobs:
  changes:
    name: Detect Changes
    uses: ./.github/workflows/changes.yml
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push'


  build_image:
    name: "Build: meshcentral"
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Check if build should run
        id: should_run
        run: echo "run=${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.docker == 'true' }}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        if: steps.should_run.outputs.run == 'true'
        with:
          node-version: "24.x"

      - name: Run translations
        if: steps.should_run.outputs.run == 'true'
        working-directory: translate
        run: |
          node translate.js || true
          node translate extractall
          node translate.js minifyall
          node translate.js translateall

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        if: steps.should_run.outputs.run == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        if: steps.should_run.outputs.run == 'true'
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: steps.should_run.outputs.run == 'true'

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        if: steps.should_run.outputs.run == 'true'
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ inputs.version != '' }}
          labels: |
            org.opencontainers.image.vendor=${{ env.ORGANISATION }}
            org.opencontainers.image.description=MeshCentral - full computer management web site
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v6
        if: steps.should_run.outputs.run == 'true'
        with:
          context: .
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Cleanup old container versions
        if: steps.docker_build.outcome == 'success'
        uses: dataaxiom/ghcr-cleanup-action@v1
        continue-on-error: true
        with:
          package: ${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          delete-ghost-images: true
          delete-tags: '.*'
          exclude-tags: '^(?:[0-9]+\.[0-9]+\.[0-9]+|latest|test-.*)$'
          use-regex: true


  build_helm:
    name: "Build Helm Chart"
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - name: Check if build should run
        id: should_run
        run: echo "run=${{ github.event_name == 'workflow_dispatch' || contains(needs.changes.outputs.helm, 'true') }}" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        if: steps.should_run.outputs.run == 'true'

      - name: Push Chart
        uses: appany/helm-oci-chart-releaser@v0.5.0
        if: steps.should_run.outputs.run == 'true'
        with:
          name: meshcentral
          tag: ${{ inputs.version || 'latest' }}
          path: ./charts/meshcentral
          registry: ${{ env.REGISTRY }}
          repository: ${{ env.ORGANISATION }}/${{ env.REPOSITORY }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}


  release:
    name: "Create Release"
    needs: [build_image]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate release header
        run: |
          cat > RELEASE_HEADER.md <<EOF
          ## Images
          - \`${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}\`

          ## Helm Chart
          - \`oci://${{ env.REGISTRY }}/${{ env.ORGANISATION }}/${{ env.REPOSITORY }}/meshcentral:${{ inputs.version }}\`
          ---
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "MeshCentral ${{ inputs.version }}"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
          body_path: RELEASE_HEADER.md

