
image:
  registry: ghcr.io/flamingo-stack/meshcentral
  repository: meshcentral
  tag: "latest"
  pullPolicy: Always
initImage:
  registry: ghcr.io/flamingo-stack/registry
  repository: mongo
  tag: "8.0.9"


# -- Sensitive credentials.
# If existingSecret is set, the chart reads MESH_USER / MESH_PASS / MESH_CONFIG_KEY
# from that Secret using the *Key fields below. Otherwise the chart creates its
# own Secret populated from the *Value fields.
credentials:
  existingSecret: ""
  meshUserKey: "MESH_USER"
  meshPassKey: "MESH_PASS"
  meshConfigKeyKey: "MESH_CONFIG_KEY"

  meshUserValue: ""
  meshPassValue: ""
  meshConfigKeyValue: ""


# -- MongoDB connection settings.
# Split across a Secret (sensitive) and a ConfigMap (non-sensitive) — both are
# envFrom'd into every container so config.settings.mongodb below can reference
# them via ${VAR} placeholders. meshcentral.js getConfig() and plugins/migrate.js
# loadConfig() substitute placeholders at startup; the password never appears in
# any rendered manifest when sourced via existingSecret.
#
# MC_MONGO_HOSTS is a comma-separated host:port list so a single shape works for
# standalone (one entry) and replica sets (N entries). Combined with replicaSet
# in the URI, the driver discovers the primary regardless of which member it
# connects to first.
#
# Each ref has two modes:
#   1. existingX: ""           → chart creates "{Chart.Name}-mongodb-creds" / "-config"
#                                 from the *Value fields below. Dev/test only.
#   2. existingX: "<name>"     → chart references that resource. Required keys:
#                                 Secret    → MC_MONGO_USER, MC_MONGO_PASSWORD
#                                 ConfigMap → MC_MONGO_HOSTS, MC_MONGO_DATABASE,
#                                             MC_MONGO_AUTH_SOURCE, MC_MONGO_REPLICA_SET
mongodb:
  existingSecret: ""
  userValue: ""
  passwordValue: ""

  existingConfigMap: ""
  hostsValue: ""
  databaseValue: "meshcentral"
  authSourceValue: "admin"
  replicaSetValue: "rs0"
  # Extra URI options appended to MC_MONGO_URI verbatim (must start with '&', or
  # leave empty). Use for cross-cluster TLS ("&tls=true"), read preference, etc.
  uriOptionsValue: ""


# -- MeshCentral config.json contents
# Ref: https://github.com/Ylianst/MeshCentral/blob/master/meshcentral-config-schema.json
config:
  settings:
    # Auto-sync cert/config files between datapath and the database on startup.
    # Required for stateless (emptyDir) deployments so server identity survives
    # pod restarts. Needs credentials.meshConfigKey set (becomes --configkey).
    autoSyncConfigFiles: true
    plugins:
      enabled: true
      list:
        - openframe
    # ${VAR} placeholders are substituted at startup from container env (see mongodb block above).
    # Override only to change query options or auth strategy; do not paste a literal URI.
    mongodb: "mongodb://${MC_MONGO_USER}:${MC_MONGO_PASSWORD}@${MC_MONGO_HOSTS}/${MC_MONGO_DATABASE}?replicaSet=${MC_MONGO_REPLICA_SET}&authSource=${MC_MONGO_AUTH_SOURCE}${MC_MONGO_URI_OPTIONS}"
    dbExpire:
      events: 157680000
    port: 8383
    aliasPort: 443
    tlsOffload: true
    redirPort: 0
    AgentPong: 300
    AllowFraming: true
    AllowLoginToken: true
    # Required behind TLS-terminating ingress: agents pin the MC TLS cert hash
    # and see the ingress cert instead, so the hash check would block every
    # connection. Not a security downgrade in this topology.
    IgnoreAgentHashCheck: true
    meshAgentBinaries:
      darwin-x64:
        compile: true
        force: true
      darwin-arm64:
        compile: true
        force: true
  domains:
    "":
      title: MeshCentral
      title2: MeshCentral
      minify: true
      NewAccounts: false
      allowedOrigin: true
    openframe_public:
      share: /opt/mesh/public

# Per-tenant Helm releases declare their tenant by adding a key to config.domains, e.g.:
#   config:
#     domains:
#       tenant-1:
#         dns: tenant-1.example.com
#         title: "Tenant 1"
#         NewAccounts: false
# The single non-empty, non-share key in config.domains is auto-detected by db.js and
# plugins/migrate.js as the tenant for this pod (deriveTenantDomain in db.js).

deploymentAnnotations: {}
podAnnotations: {}

revisionHistoryLimit: 10

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "300m"

startupProbe:
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30
livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 6
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
